<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIGHTROUTE</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <div class="sidebar">

        <div class="logo">
            <span class="logo-icon">🚀</span>
            <span class="logo-text">RIGHTROUTE</span>
        </div>

        <button
            class="new-chat"
            onclick="newComplaint()">

            + New Complaint

        </button>

        <div class="sidebar-title">
            Recent Complaints
        </div>

        <div
            id="history-list"
            class="history-list">

        </div>

    </div>


    <div class="main-content">

        <!-- Header -->

        <div class="header">

            <h1>RIGHTROUTE</h1>

            <p>
                Policy-to-Action Civic Intelligence Platform
            </p>

        </div>

        <!-- Chat Area -->

        <div
            id="chat-box"
            class="chat-box">

            <div class="hero">

                <h2>
     Welcome to Civic Copilot
</h2>

<p>
    Describe your civic issue in your own words.

    I'll help you file complaints, prepare official documents,
    find government services, and guide you through the process.
</p>

                

            </div>

        </div>


        <div class="input-area">

                <input
                    type="text"
                    id="complaint"
                    placeholder="Describe your civic issue..."
                >

            <button onclick="sendComplaint()">
                Send
            </button>

        </div>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
